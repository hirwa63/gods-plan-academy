<script>
// --- UPDATED GALLERY DATA WITH YOUR IMAGES ---
var galleryData = [

];

function renderGallery() {
  document.getElementById('gg').innerHTML = galleryData.map(function(g) {
    return '<div class="gi">'
      + '<div class="gi-inner" style="background:url(\'' + g.img + '\') center/cover no-repeat;"></div>'
      + '<div class="gi-label">' + g.label + '</div>'
      + '</div>';
  }).join('');
}

renderGallery();

function toggleMob() { document.getElementById('mobMenu').classList.toggle('open'); }
window.addEventListener('scroll', function() {
    document.querySelectorAll('.reveal').forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('visible');
    });
});
