<div id="gg" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
    </div>

<script>
/**
 * UPDATED FILENAMES: 
 * I matched these exactly to your GitHub screenshot: "hero (10).jpeg"
 * Note the SPACE between 'hero' and '(10)'.
 */
const galleryData = [
  { img: "hero (10).jpeg", label: "Campus View" },
  { img: "hero (11).jpeg", label: "Our Students" },
  { img: "hero (12).jpeg", label: "Academic Excellence" },
  { img: "hero (13).jpeg", label: "Learning Environment" },
  { img: "hero (14).jpeg", label: "Student Activities" },
  { img: "hero (15).jpeg", label: "School Community" }
];

function renderGallery() {
  const container = document.getElementById('gg');
  if (!container) return;

  container.innerHTML = galleryData.map(function(g) {
    /** * CRITICAL FIX: encodeURIComponent converts the " " (space) to "%20" 
     * so Vercel can find the file.
     */
    const encodedPath = encodeURIComponent(g.img);
    
    return `
      <div class="gi" style="background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: transform 0.3s ease;">
        <div class="gi-inner" style="background: url('${encodedPath}') center/cover no-repeat; height: 350px;"></div>
        <div class="gi-label" style="padding: 20px; font-family: 'Outfit', sans-serif; font-weight: 600; color: #085041; text-align: center;">
          ${g.label}
        </div>
      </div>
    `;
  }).join('');
}

// Execute the render
renderGallery();
</script>
